name: Daily Watchdog (兜底告警)

# 兜底：云端 Routine 若失败/没跑/被关卡挡住，会全程静默（不生成、不 commit）。
# 本 watchdog 每天在预期出报时间之后检查「今天的报告有没有」，没有就让本 Action 失败
# → GitHub 自动邮件通知仓库 owner + Actions 页变红，让人知道要手动重跑。
# 不发飞书/Slack（那两个渠道只用于接收日报，不放运维告警）。
on:
  schedule:
    - cron: '30 2 * * *'   # UTC 02:30 = 北京 10:30（Routine 08:03 北京之后约 2.5h）
  workflow_dispatch: {}

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查今日报告是否已生成（没有则失败 → GitHub 通知）
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%F)
          LATEST=$(node -e "try{console.log(require('./docs/latest.json').date||'')}catch(e){console.log('')}")
          echo "今天(北京)=$TODAY，latest.json.date=$LATEST"
          if [ "$LATEST" = "$TODAY" ]; then
            echo "✅ 今日报告已生成"
            exit 0
          fi
          echo "::error::今日($TODAY)未检测到新报告（latest=$LATEST）。云端 Routine 可能失败/未跑/被关卡挡住，请打开 Routine 管理页查看 run 日志并手动重跑。"
          exit 1
